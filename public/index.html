<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rynnet</title>
    
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div class="menubar">
        <div class="menubar-left">
            <div class="menu-item logo">rynnet</div>
            <div class="menu-item">File</div>
            <div class="menu-item">Edit</div>
            <div class="menu-item">View</div>
        </div>
        <div class="menubar-right">
            <div class="menu-item" id="settingsBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492M5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0"/>
                    <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115z"/>
                </svg>
            </div>
        </div>
    </div>

    <div class="address-bar" id="addressBar">
        <button class="address-bar-btn" id="backBtn" title="Back">
            <i class="bi bi-arrow-left"></i>
        </button>
        <button class="address-bar-btn" id="forwardBtn" title="Forward">
            <i class="bi bi-arrow-right"></i>
        </button>
        <button class="address-bar-btn" id="refreshBtn" title="Refresh">
            <i class="bi bi-arrow-clockwise"></i>
        </button>
        <button class="address-bar-btn" id="homeBtn" title="Home">
            <i class="bi bi-house"></i>
        </button>
        <input type="text" class="address-bar-input" id="addressInput" placeholder="Enter URL">
    </div>

    <div class="container">
        <div class="search-box">
            <form id="urlForm">
                <input 
                    type="text" 
                    id="urlInput" 
                    class="search-input" 
                    placeholder="search or enter url"
                    autocomplete="off"
                >
            </form>
            <div class="error-container" id="errorContainer">
                <div class="error-content">
                    <span id="errorText"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="dock">
        <div class="dock-item" data-url="https://youtube.com" title="YouTube">
            <i class="bi bi-youtube"></i>
        </div>
        <div class="dock-item" data-url="https://discord.com" title="Discord">
            <i class="bi bi-discord"></i>
        </div>
        <div class="dock-item" data-url="https://reddit.com" title="Reddit">
            <i class="bi bi-reddit"></i>
        </div>
        <div class="dock-item" data-url="https://twitter.com" title="Twitter">
            <i class="bi bi-twitter-x"></i>
        </div>
        <div class="dock-separator"></div>
        <div class="dock-item" data-url="https://github.com" title="GitHub">
            <i class="bi bi-github"></i>
        </div>
        <div class="dock-item" data-url="https://twitch.tv" title="Twitch">
            <i class="bi bi-twitch"></i>
        </div>
        <div class="dock-item" data-url="https://instagram.com" title="Instagram">
            <i class="bi bi-instagram"></i>
        </div>
        <div class="dock-item" data-url="https://spotify.com" title="Spotify">
            <i class="bi bi-spotify"></i>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h2>Settings</h2>
            <button class="close-btn" id="closeSettings">×</button>
        </div>
        <div class="settings-content">
            <div class="setting-item">
                <label>Search Engine</label>
                <select id="searchEngine">
                    <option value="https://www.google.com/search?q=%s">Google</option>
                    <option value="https://duckduckgo.com/?q=%s">DuckDuckGo</option>
                    <option value="https://www.bing.com/search?q=%s">Bing</option>
                </select>
            </div>
        </div>
    </div>
</body>
</html>
